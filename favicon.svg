<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#02070a"/>
  <g fill="#7db6de" filter="url(#glow)">
    <rect x="14" y="14" width="15" height="15" rx="2"/>
    <rect x="35" y="14" width="15" height="15" rx="2"/>
    <rect x="14" y="35" width="15" height="15" rx="2"/>
    <rect x="35" y="35" width="15" height="15" rx="2"/>
    <rect x="29" y="29" width="6" height="6" rx="1"/>
  </g>
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
